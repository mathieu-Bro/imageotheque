<section class="filters-panel">
  <div class="filters-row filters-row-main">

    <input id="searchInput" type="search" placeholder="Rechercher une photo, un dossier, un mot-clé...">

    <select id="yearModeSelect">
      <option value="">Toutes les années</option>
      <option value="before">Avant</option>
      <option value="after">Après</option>
      <option value="between">Entre</option>
      <option value="exact">Année exacte</option>
    </select>

    <select id="yearFromSelect">
      <option value="">Année</option>
    </select>

    <select id="yearToSelect">
      <option value="">Et...</option>
    </select>

    <select id="extensionSelect">
      <option value="">Tous les types</option>
    </select>

    <select id="folderSelect">
      <option value="">Tous les dossiers</option>
    </select>

    <select id="sortSelect">
      <option value="folder">Tri par dossier</option>
      <option value="year">Tri par année</option>
      <option value="name">Tri par nom</option>
      <option value="extension">Tri par type</option>
    </select>

    <button id="resetButton" type="button">Réinitialiser</button>

  </div>
</section>
